<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PhotoCraft Pro — AI Photo Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f1f5f9;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }

        .sub {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }

        /* Preview area */
        .preview-area {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 24px;
            aspect-ratio: 3 / 4;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 16px;
            overflow: hidden;
            position: relative;
            transition: all 0.2s;
        }

        .preview-area:active {
            transform: scale(0.99);
        }

        .preview-placeholder {
            text-align: center;
            color: #94a3b8;
            padding: 20px;
        }

        .preview-placeholder-icon {
            font-size: 56px;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #0f172a;
        }

        .file-info {
            font-size: 12px;
            color: #475569;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
            word-break: break-all;
        }

        /* Controls */
        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
            margin-left: 4px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            font-size: 15px;
            background: white;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .save-btn, .reset-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .save-btn {
            background: #3b82f6;
            color: white;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }

        .save-btn:active {
            transform: scale(0.97);
            background: #2563eb;
        }

        .reset-btn {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .reset-btn:active {
            transform: scale(0.97);
            background: #e2e8f0;
        }

        .status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 24px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            display: none;
            animation: fadeIn 0.2s ease;
        }

        .status.success {
            background: #dcfce7;
            color: #166534;
            display: block;
        }

        .status.info {
            background: #dbeafe;
            color: #1e40af;
            display: block;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .debug-panel {
            margin-top: 20px;
            background: #0f172a;
            color: #a5f3fc;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 10px;
            padding: 12px;
            border-radius: 20px;
            word-break: break-all;
            line-height: 1.4;
            text-align: center;
            border: 1px solid #334155;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📸 PhotoCraft Pro</h1>
    <div class="sub">AI Photo Studio • Сохраняй в один клик</div>

    <div id="uploadZone" class="preview-area">
        <div id="previewPlaceholder" class="preview-placeholder">
            <div class="preview-placeholder-icon">🖼️</div>
            <div>Нажми, чтобы выбрать фото</div>
            <div style="font-size: 11px; margin-top: 8px;">JPG, PNG, WEBP</div>
        </div>
        <img id="previewImg" class="preview-image" style="display: none;" alt="preview">
    </div>

    <div id="fileInfo" class="file-info" style="display: none;"></div>

    <div class="input-group">
        <label>📄 Имя файла (без расширения)</label>
        <input type="text" id="fileName" value="photocraft_image">
    </div>

    <div class="button-group">
        <button class="save-btn" id="saveBtn">💾 СОХРАНИТЬ</button>
        <button class="reset-btn" id="resetBtn">↺ Сбросить</button>
    </div>

    <div id="status" class="status"></div>
    <div id="debugInfo" class="debug-panel">🔍 Инициализация...</div>
</div>

<script>
    (function() {
        // DOM elements
        const uploadZone = document.getElementById('uploadZone');
        const previewImg = document.getElementById('previewImg');
        const previewPlaceholder = document.getElementById('previewPlaceholder');
        const fileInfoDiv = document.getElementById('fileInfo');
        const fileNameInput = document.getElementById('fileName');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusDiv = document.getElementById('status');
        const debugDiv = document.getElementById('debugInfo');

        let currentBase64 = null;       // полный base64 data URL
        let currentBlob = null;          // оригинальный Blob
        let currentMime = 'image/png';

        // === UI helpers ===
        function showStatus(message, type = 'success') {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
            setTimeout(() => {
                if (statusDiv) statusDiv.style.display = 'none';
            }, 4500);
        }

        function showDebug(msg) {
            if (debugDiv) {
                const timestamp = new Date().toLocaleTimeString();
                debugDiv.innerHTML = `🔧 ${timestamp} — ${msg}`;
            }
            console.log('[PhotoCraft]', msg);
        }

        // === Проверка окружения ===
        function detectPlatform() {
            const isCapacitor = typeof Capacitor !== 'undefined';
            const isNative = isCapacitor && Capacitor.isNativePlatform?.();
            let platform = 'web';
            if (isNative) platform = 'capacitor_android';
            else if (isCapacitor) platform = 'capacitor_web';
            
            const pluginsList = (isCapacitor && Capacitor.Plugins) ? Object.keys(Capacitor.Plugins) : [];
            showDebug(`${platform.toUpperCase()} | Plugins: ${pluginsList.length ? pluginsList.join(', ') : '—'}`);
            
            return { isNative, platform };
        }

        // === ОСНОВНОЕ СОХРАНЕНИЕ: системный просмотрщик Android ===
        async function saveImage() {
            if (!currentBase64 && !currentBlob) {
                showStatus('❌ Сначала выберите изображение', 'error');
                return;
            }

            const { isNative } = detectPlatform();
            showStatus('⏳ Открываю изображение...', 'info');
            
            // Получаем полный base64 для отображения
            let fullImage = currentBase64;
            if (!fullImage && currentBlob) {
                fullImage = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(currentBlob);
                });
            }
            
            if (!fullImage) {
                showStatus('❌ Ошибка подготовки изображения', 'error');
                return;
            }
            
            if (isNative) {
                // АНДРОИД APK: открываем фото в системном просмотрщике
                // Пользователь нажимает "Сохранить" стандартной кнопкой Android
                try {
                    // Используем window.location для открытия data URL
                    // Это вызовет системный просмотрщик с кнопкой сохранения
                    window.location.href = fullImage;
                    showStatus('📱 Фото открыто. Нажмите "Сохранить" внизу экрана', 'success');
                    showDebug('Открыт системный просмотрщик через location.href');
                } catch (e) {
                    console.error('Location error:', e);
                    // Fallback: создать временную ссылку
                    const link = document.createElement('a');
                    link.href = fullImage;
                    link.download = (fileNameInput.value.trim() || 'photocraft') + '.png';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    showStatus('✅ Файл сохранён (альтернативный способ)', 'success');
                }
            } else {
                // ВЕБ-ВЕРСИЯ: стандартное скачивание
                const link = document.createElement('a');
                link.href = fullImage;
                link.download = (fileNameInput.value.trim() || 'photocraft') + '.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showStatus('✅ Изображение сохранено (браузер)', 'success');
                showDebug(`Веб-загрузка: ${fileNameInput.value.trim() || 'photocraft'}.png`);
            }
        }
        
        // === ЗАГРУЗКА ФАЙЛА ===
        function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) {
                showStatus('❌ Пожалуйста, выберите изображение (JPG, PNG, WEBP)', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const dataUrl = e.target.result;
                currentBase64 = dataUrl;
                currentBlob = file;
                currentMime = file.type;
                
                // Имя файла по умолчанию
                const rawName = file.name.replace(/\.[^/.]+$/, '');
                if (rawName) fileNameInput.value = rawName;
                
                // Превью
                previewImg.src = dataUrl;
                previewImg.style.display = 'block';
                previewPlaceholder.style.display = 'none';
                
                const sizeMB = (file.size / 1024 / 1024).toFixed(2);
                fileInfoDiv.style.display = 'block';
                fileInfoDiv.innerHTML = `📸 ${file.name}  •  ${sizeMB} MB  •  ${file.type.split('/')[1].toUpperCase()}`;
                
                showStatus('✅ Готово! Нажмите "СОХРАНИТЬ"', 'success');
                showDebug(`Загружено: ${file.name} (${sizeMB} MB)`);
            };
            reader.onerror = () => {
                showStatus('❌ Ошибка чтения файла', 'error');
            };
            reader.readAsDataURL(file);
        }
        
        // Выбор файла через клик
        function triggerFileSelect() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/jpeg,image/png,image/webp';
            input.onchange = (e) => {
                if (e.target.files && e.target.files[0]) handleFile(e.target.files[0]);
            };
            input.click();
        }
        
        // Сброс
        function resetAll() {
            currentBase64 = null;
            currentBlob = null;
            previewImg.style.display = 'none';
            previewImg.src = '';
            previewPlaceholder.style.display = 'flex';
            fileInfoDiv.style.display = 'none';
            fileNameInput.value = 'photocraft_image';
            showStatus('🔄 Изображение сброшено', 'info');
            showDebug('Сброс выполнен');
        }
        
        // === ИНИЦИАЛИЗАЦИЯ И СОБЫТИЯ ===
        uploadZone.addEventListener('click', triggerFileSelect);
        saveBtn.addEventListener('click', saveImage);
        resetBtn.addEventListener('click', resetAll);
        
        // Drag & Drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.style.borderColor = '#3b82f6';
            uploadZone.style.backgroundColor = '#eff6ff';
        });
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.style.borderColor = '#cbd5e1';
            uploadZone.style.backgroundColor = '#f8fafc';
        });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.style.borderColor = '#cbd5e1';
            uploadZone.style.backgroundColor = '#f8fafc';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) handleFile(file);
            else showStatus('❌ Перетащите изображение', 'error');
        });
        
        // Проверка Capacitor после полной загрузки
        setTimeout(() => {
            const { isNative, platform } = detectPlatform();
            if (isNative) {
                showDebug('✅ APK режим активен. При нажатии "СОХРАНИТЬ" откроется системный просмотрщик');
            } else {
                showDebug('🌐 Веб-режим: сохранение через стандартное скачивание');
            }
        }, 300);
    })();
</script>
</body>
</html>
