<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PhotoCraft Pro — AI Photo Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f1f5f9;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }
        .preview-area {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 24px;
            aspect-ratio: 3 / 4;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .preview-placeholder { text-align: center; color: #94a3b8; }
        .preview-placeholder-icon { font-size: 56px; margin-bottom: 12px; }
        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .file-info {
            font-size: 12px;
            color: #475569;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .input-group { margin-bottom: 16px; }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            font-size: 15px;
        }
        .button-group { display: flex; gap: 12px; margin-top: 8px; }
        .save-btn, .reset-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .save-btn { background: #3b82f6; color: white; }
        .reset-btn { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 24px;
            text-align: center;
            font-size: 13px;
            display: none;
        }
        .status.success { background: #dcfce7; color: #166534; display: block; }
        .status.info { background: #dbeafe; color: #1e40af; display: block; }
        .status.error { background: #fee2e2; color: #991b1b; display: block; }
        .debug-panel {
            margin-top: 20px;
            background: #0f172a;
            color: #a5f3fc;
            font-family: monospace;
            font-size: 10px;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📸 PhotoCraft Pro</h1>
    <div class="sub">AI Photo Studio • Сохраняй с одного касания</div>

    <div id="uploadZone" class="preview-area">
        <div id="previewPlaceholder" class="preview-placeholder">
            <div class="preview-placeholder-icon">🖼️</div>
            <div>Нажми, чтобы выбрать фото</div>
        </div>
        <img id="previewImg" class="preview-image" style="display: none;" alt="preview">
    </div>
    <div id="fileInfo" class="file-info" style="display: none;"></div>

    <div class="input-group">
        <label>📄 Имя файла</label>
        <input type="text" id="fileName" value="photocraft_image">
    </div>

    <div class="button-group">
        <button class="save-btn" id="saveBtn">💾 СОХРАНИТЬ</button>
        <button class="reset-btn" id="resetBtn">↺ Сбросить</button>
    </div>

    <div id="status" class="status"></div>
    <div id="debugInfo" class="debug-panel">🔍 Инициализация...</div>
</div>

<script>
(function() {
    const uploadZone = document.getElementById('uploadZone');
    const previewImg = document.getElementById('previewImg');
    const previewPlaceholder = document.getElementById('previewPlaceholder');
    const fileInfoDiv = document.getElementById('fileInfo');
    const fileNameInput = document.getElementById('fileName');
    const saveBtn = document.getElementById('saveBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusDiv = document.getElementById('status');
    const debugDiv = document.getElementById('debugInfo');

    let currentBase64 = null;
    let currentBlob = null;
    let currentMime = 'image/png';

    function showStatus(message, type) {
        statusDiv.textContent = message;
        statusDiv.className = `status ${type}`;
        statusDiv.style.display = 'block';
        setTimeout(() => statusDiv.style.display = 'none', 4500);
    }

    function showDebug(msg) {
        debugDiv.innerHTML = `🔧 ${new Date().toLocaleTimeString()} — ${msg}`;
        console.log(msg);
    }

    async function saveImage() {
        if (!currentBase64 && !currentBlob) {
            showStatus('❌ Сначала выберите изображение', 'error');
            return;
        }

        const isCapacitor = typeof Capacitor !== 'undefined' && Capacitor.isNativePlatform?.();
        const hasPlugin = !!(Capacitor?.Plugins?.SaveImagePlugin);
        
        showStatus('⏳ Подготовка...', 'info');
        
        // 1. Нативный плагин
        if (isCapacitor && hasPlugin) {
            try {
                let finalBase64 = currentBase64;
                if (!finalBase64 && currentBlob) {
                    finalBase64 = await new Promise(r => {
                        const fr = new FileReader();
                        fr.onloadend = () => r(fr.result);
                        fr.readAsDataURL(currentBlob);
                    });
                }
                const name = (fileNameInput.value.trim() || 'photocraft') + '_' + Date.now() + '.png';
                const result = await Capacitor.Plugins.SaveImagePlugin.saveToGallery({
                    base64: finalBase64,
                    fileName: name
                });
                if (result?.success) {
                    showStatus('✅ Сохранено в галерею!', 'success');
                    showDebug(`Сохранено: ${name}`);
                    return;
                }
            } catch(e) {
                showDebug(`Плагин ошибка: ${e.message}`);
            }
        }
        
        // 2. Fallback: долгое нажатие
        if (isCapacitor) {
            previewImg.scrollIntoView({ behavior: 'smooth', block: 'center' });
            previewImg.style.boxShadow = '0 0 0 4px #3b82f6';
            setTimeout(() => previewImg.style.boxShadow = '', 2000);
            
            const toast = document.createElement('div');
            toast.innerText = '👇 Нажми и УДЕРЖИВАЙ на фото → "Сохранить изображение"';
            toast.style.cssText = 'position:fixed;bottom:30px;left:20px;right:20px;background:#0f172a;color:white;padding:14px;border-radius:60px;text-align:center;z-index:9999';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
            showStatus('💡 Нажмите и удерживайте на изображении', 'info');
            return;
        }
        
        // 3. Веб-версия
        if (!isCapacitor && currentBase64) {
            const link = document.createElement('a');
            link.href = currentBase64;
            link.download = (fileNameInput.value.trim() || 'photocraft') + '.png';
            link.click();
            showStatus('✅ Сохранено в браузере', 'success');
        }
    }

    function handleFile(file) {
        if (!file.type.startsWith('image/')) {
            showStatus('❌ Выберите изображение', 'error');
            return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
            currentBase64 = e.target.result;
            currentBlob = file;
            currentMime = file.type;
            previewImg.src = currentBase64;
            previewImg.style.display = 'block';
            previewPlaceholder.style.display = 'none';
            const sizeMB = (file.size / 1024 / 1024).toFixed(2);
            fileInfoDiv.style.display = 'block';
            fileInfoDiv.innerHTML = `📸 ${file.name} • ${sizeMB} MB`;
            showStatus('✅ Готово! Нажмите "Сохранить"', 'success');
        };
        reader.readAsDataURL(file);
    }

    uploadZone.addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = e => e.target.files?.[0] && handleFile(e.target.files[0]);
        input.click();
    });
    saveBtn.addEventListener('click', saveImage);
    resetBtn.addEventListener('click', () => {
        currentBase64 = null;
        currentBlob = null;
        previewImg.style.display = 'none';
        previewPlaceholder.style.display = 'flex';
        fileInfoDiv.style.display = 'none';
        showStatus('🔄 Сброшено', 'info');
    });

    setTimeout(() => {
        const isCapacitor = typeof Capacitor !== 'undefined';
        const hasPlugin = !!(Capacitor?.Plugins?.SaveImagePlugin);
        showDebug(isCapacitor ? `APK режим | Плагин: ${hasPlugin ? '✅' : '❌'}` : '🌐 Веб-режим');
    }, 300);
})();
</script>
</body>
</html>
