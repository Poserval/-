name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Capacitor and plugins
        run: |
          npm install --legacy-peer-deps @capacitor/cli@5.7.8 @capacitor/core@5.7.8 @capacitor/android@5.7.8
          npm install --legacy-peer-deps @capacitor/filesystem@5.1.0 @capacitor/share@5.0.6
          
      - name: Remove old android folder
        run: rm -rf android
          
      - name: Init Capacitor
        run: npx cap init PhotoCraftPro com.photocraft.pro --web-dir=docs
          
      - name: Add Android platform
        run: npx cap add android
          
      - name: Copy native plugin files
        run: |
          # Создаём структуру папок для плагина
          mkdir -p android/app/src/main/java/com/photocraft/pro
          
          # Копируем плагин из репозитория в android проект
          cp android/app/src/main/java/com/photocraft/pro/SaveImagePlugin.java android/app/src/main/java/com/photocraft/pro/ 2>/dev/null || echo "Plugin file not found in repo"
          
      - name: Sync Capacitor
        run: npx cap sync android
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCraftPro
          path: android/app/build/outputs/apk/debug/app-debug.apk
